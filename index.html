<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok 短剧行业数据分析平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #ff0050, #ff6b6b); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #ff0050; }
        .stat-card .label { font-size: 12px; color: #999; margin-top: 5px; }
        
        .section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h2 { margin-bottom: 15px; color: #333; border-bottom: 2px solid #ff0050; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #666; font-size: 12px; }
        tr:hover { background: #f8f9fa; }
        
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #ff0050; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn:hover { opacity: 0.9; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        .progress-bar { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff0050, #ff6b6b); transition: width 0.3s; }
        
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
        .tag-high { background: #e8f5e9; color: #2e7d32; }
        .tag-medium { background: #fff3e0; color: #ef6c00; }
        .tag-low { background: #ffebee; color: #c62828; }
        .tag-official { background: #e3f2fd; color: #1565c0; border: 1px solid #1565c0; }
        .tag-kol { background: #f3e5f5; color: #7b1fa2; border: 1px solid #7b1fa2; }
        .tag-unknown { background: #fafafa; color: #616161; border: 1px solid #bdbdbd; }
        
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-bar select { padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-width: 150px; }
        
        .access-info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2196f3; }
        .access-info h4 { color: #1565c0; margin-bottom: 5px; }
        .access-info p { color: #424242; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 TikTok 短剧行业数据分析平台</h1>
        <p>DigiMorph 矩阵运营数据支撑系统</p>
    </div>
    
    <div class="container">
        <!-- 访问信息 -->
        <div class="access-info">
            <h4>🔗 外网访问地址</h4>
            <p id="accessUrl">正在获取服务器地址...</p>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总账号数</h3>
                <div class="number" id="totalAccounts">0</div>
                <div class="label">目标: 1000</div>
                <div class="progress-bar" style="margin-top: 10px;">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3>大号 (>1万粉)</h3>
                <div class="number" id="highPerformers">0</div>
                <div class="label">头部账号</div>
            </div>
            <div class="stat-card">
                <h3>官方账号</h3>
                <div class="number" id="officialCount">0</div>
                <div class="label">短剧平台官方</div>
            </div>
            <div class="stat-card">
                <h3>KOL账号</h3>
                <div class="number" id="kolCount">0</div>
                <div class="label">个人创作者</div>
            </div>
        </div>
        
        <!-- 账号列表 -->
        <div class="section">
            <h2>📊 账号数据表</h2>
            
            <div class="filter-bar">
                <select id="filterType" onchange="filterAccounts()">
                    <option value="">全部类型</option>
                    <option value="官方号">官方号</option>
                    <option value="KOL">KOL</option>
                    <option value="未知">未知</option>
                </select>
                <select id="filterLevel" onchange="filterAccounts()">
                    <option value="">全部等级</option>
                    <option value="大号">大号 (>1万)</option>
                    <option value="中号">中号 (1k-1万)</option>
                    <option value="小号">小号 (<1k)</option>
                </select>
                <button class="btn btn-primary" onclick="exportData()">导出数据</button>
            </div>
            
            <table id="accountsTable">
                <thead>
                    <tr>
                        <th>账号名</th>
                        <th>类型</th>
                        <th>粉丝数</th>
                        <th>赞数</th>
                        <th>视频数</th>
                        <th>均赞/视频</th>
                        <th>互动率</th>
                        <th>行业类型</th>
                        <th>作品风格</th>
                        <th>等级</th>
                    </tr>
                </thead>
                <tbody id="accountsTableBody">
                    <tr><td colspan="10" style="text-align: center; color: #999;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 批量导入 -->
        <div class="section">
            <h2>📥 批量导入账号</h2>
            <p style="color: #666; margin-bottom: 10px; font-size: 13px;">
                格式: 账号名,粉丝数,赞数,视频数,账号类型(官方号/KOL),行业类型,作品风格<br>
                示例: drama123,5000,15000,50,KOL,短剧分销,悬疑反转
            </p>
            <textarea id="batchInput" rows="6" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" 
                placeholder="drama123,5000,15000,50,KOL,短剧分销,悬疑反转
series456,3000,8000,30,KOL,短剧分销,甜宠爱情
reelshort,8100000,25100000,4951,官方号,短剧平台,综合"></textarea>
            <button class="btn btn-primary" onclick="importBatch()" style="margin-top: 10px;">批量导入</button>
        </div>
    </div>
    
    <script>
        // 自动检测API地址
        const API_URL = window.location.origin + '/api';
        
        // 显示访问地址
        document.getElementById('accessUrl').textContent = window.location.origin;
        
        let allAccounts = [];
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                
                document.getElementById('totalAccounts').textContent = data.total_accounts;
                document.getElementById('highPerformers').textContent = data.high_performers;
                document.getElementById('officialCount').textContent = data.official_count;
                document.getElementById('kolCount').textContent = data.kol_count;
                
                const progress = (data.total_accounts / 1000 * 100).toFixed(1);
                document.getElementById('progressBar').style.width = progress + '%';
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }
        
        // 加载账号列表
        async function loadAccounts() {
            try {
                const response = await fetch(`${API_URL}/accounts`);
                allAccounts = await response.json();
                renderAccounts(allAccounts);
            } catch (e) {
                console.error('加载账号失败:', e);
            }
        }
        
        // 渲染账号列表
        function renderAccounts(accounts) {
            const tbody = document.getElementById('accountsTableBody');
            if (accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; color: #999;">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = accounts.map(acc => {
                const followers = parseInt(acc.followers) || 0;
                const hearts = parseInt(acc.hearts) || 0;
                const videos = parseInt(acc.videos) || 0;
                const avgHeart = videos > 0 ? (hearts / videos).toFixed(1) : 0;
                const engagement = followers > 0 ? (hearts / followers * 100).toFixed(2) : 0;
                
                // 等级标签
                let levelTag = '';
                if (followers > 10000) levelTag = '<span class="tag tag-high">大号</span>';
                else if (followers > 1000) levelTag = '<span class="tag tag-medium">中号</span>';
                else levelTag = '<span class="tag tag-low">小号</span>';
                
                // 账号类型标签
                const accountType = acc.account_type || acc.账号类型 || '未知';
                let typeTag = '';
                if (accountType === '官方号') typeTag = '<span class="tag tag-official">官方号</span>';
                else if (accountType === 'KOL') typeTag = '<span class="tag tag-kol">KOL</span>';
                else typeTag = '<span class="tag tag-unknown">未知</span>';
                
                return `<tr>
                    <td><strong>@${acc.username || acc.name || acc.账号名}</strong></td>
                    <td>${typeTag}</td>
                    <td>${followers.toLocaleString()}</td>
                    <td>${hearts.toLocaleString()}</td>
                    <td>${videos}</td>
                    <td>${avgHeart}</td>
                    <td>${engagement}%</td>
                    <td>${acc.industry || acc.category || acc.行业类型 || '-'}</td>
                    <td>${acc.style || acc.作品风格 || '-'}</td>
                    <td>${levelTag}</td>
                </tr>`;
            }).join('');
        }
        
        // 筛选账号
        function filterAccounts() {
            const typeFilter = document.getElementById('filterType').value;
            const levelFilter = document.getElementById('filterLevel').value;
            
            let filtered = allAccounts;
            
            if (typeFilter) {
                filtered = filtered.filter(acc => {
                    const accType = acc.account_type || acc.账号类型 || '未知';
                    return accType === typeFilter;
                });
            }
            
            if (levelFilter) {
                filtered = filtered.filter(acc => {
                    const followers = parseInt(acc.followers) || 0;
                    if (levelFilter === '大号') return followers > 10000;
                    if (levelFilter === '中号') return followers >= 1000 && followers <= 10000;
                    if (levelFilter === '小号') return followers < 1000;
                });
            }
            
            renderAccounts(filtered);
        }
        
        // 批量导入
        async function importBatch() {
            const input = document.getElementById('batchInput').value.trim();
            if (!input) return;
            
            const lines = input.split('\n');
            const accounts = [];
            
            for (const line of lines) {
                const parts = line.split(',');
                if (parts.length >= 4) {
                    accounts.push({
                        username: parts[0].trim(),
                        followers: parts[1].trim(),
                        hearts: parts[2].trim(),
                        videos: parts[3].trim(),
                        account_type: parts[4]?.trim() || '未知',
                        industry: parts[5]?.trim() || '',
                        style: parts[6]?.trim() || ''
                    });
                }
            }
            
            try {
                const response = await fetch(`${API_URL}/accounts/batch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(accounts)
                });
                
                const result = await response.json();
                if (result.success) {
                    alert(`成功导入 ${result.count} 个账号`);
                    document.getElementById('batchInput').value = '';
                    loadStats();
                    loadAccounts();
                }
            } catch (e) {
                alert('导入失败: ' + e.message);
            }
        }
        
        // 导出数据
        function exportData() {
            const csv = [
                ['账号名', '类型', '粉丝数', '赞数', '视频数', '均赞/视频', '互动率', '行业', '风格'],
                ...allAccounts.map(acc => {
                    const followers = parseInt(acc.followers) || 0;
                    const hearts = parseInt(acc.hearts) || 0;
                    const videos = parseInt(acc.videos) || 0;
                    const avg = videos > 0 ? (hearts / videos).toFixed(1) : 0;
                    const eng = followers > 0 ? (hearts / followers * 100).toFixed(2) : 0;
                    return [
                        acc.username || acc.name,
                        acc.account_type || acc.账号类型 || '未知',
                        followers,
                        hearts,
                        videos,
                        avg,
                        eng + '%',
                        acc.industry || acc.行业类型 || '',
                        acc.style || acc.作品风格 || ''
                    ];
                })
            ].map(row => row.join(',')).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tiktok_accounts_export.csv';
            a.click();
        }
        
        // 初始化
        loadStats();
        loadAccounts();
        
        // 每30秒刷新
        setInterval(() => {
            loadStats();
            loadAccounts();
        }, 30000);
    </script>
</body>
</html>
