        function init() {
            const accounts = ACCOUNTS_DATA || [];
            
            // 计算统计数据
            const total = accounts.length;
            const high = accounts.filter(a => (a.followers || 0) > 10000).length;
            const official = accounts.filter(a => a.account_type === '官方号').length;
            const kol = accounts.filter(a => a.account_type === 'KOL').length;
            
            // 更新统计卡片
            document.getElementById('totalAccounts').textContent = total;
            document.getElementById('highPerformers').textContent = high;
            document.getElementById('officialCount').textContent = official;
            document.getElementById('kolCount').textContent = kol;
            
            // 更新进度条
            const progress = Math.min((total / 1000 * 100), 100).toFixed(1);
            document.getElementById('progressText').textContent = `${total} / 1000`;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
            
            // 渲染表格
            renderTable(accounts);
        }
        
        function renderTable(accounts) {
            const tbody = document.getElementById('accountsTableBody');
            
            if (accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="error">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = accounts.map(acc => {
                const followers = parseInt(acc.followers) || 0;
                const hearts = parseInt(acc.hearts) || 0;
                const videos = parseInt(acc.videos) || 0;
                const avgHeart = videos > 0 ? (hearts / videos).toFixed(1) : 0;
                const engagement = followers > 0 ? (hearts / followers * 100).toFixed(2) : 0;
                
                let levelTag = followers > 10000 ? 'tag-high' : followers > 1000 ? 'tag-medium' : 'tag-low';
                let levelText = followers > 10000 ? '大号' : followers > 1000 ? '中号' : '小号';
                
                let typeClass = acc.account_type === '官方号' ? 'tag-official' : 'tag-kol';
                let typeText = acc.account_type || '未知';
                
                return `<tr>
                    <td><strong>@${acc.username}</strong></td>
                    <td><span class="tag ${typeClass}">${typeText}</span></td>
                    <td>${followers.toLocaleString()}</td>
                    <td>${hearts.toLocaleString()}</td>
                    <td>${videos}</td>
                    <td>${avgHeart}</td>
                    <td>${engagement}%</td>
                    <td>${acc.industry || '-'}</td>
                    <td>${acc.source || '-'}</td>
                </tr>`;
            }).join('');
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
