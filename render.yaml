services:
  - type: web
    name: tiktok-analytics-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    autoDeploy: true

  - type: pserv
    name: tiktok-analytics-db
    runtime: docker
    image:
      url: postgres:15-alpine
    disk:
      name: data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
